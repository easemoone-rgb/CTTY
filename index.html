<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>冲天投篮大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: #0a0a0f;
        }
        
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* 盾牌Logo */
        #logo {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 20px #ff3333, 0 0 40px #ff0000;
            z-index: 100;
            pointer-events: none;
        }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 100;
            pointer-events: none;
        }
        
        .hud-item {
            color: #fff;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        #combo {
            color: #ffcc00;
            text-shadow: 0 0 15px #ffcc00;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        /* 得分飘字容器 */
        #scorePopups {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }
        
        .score-popup {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px currentColor;
            animation: scoreFloat 1s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes scoreFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
        }
        
        /* 开始/结束界面 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        #overlay.hidden { display: none; }
        
        .title {
            font-size: 36px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 30px #ff3333;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 40px;
        }
        
        .btn {
            padding: 15px 50px;
            font-size: 18px;
            color: #fff;
            background: linear-gradient(135deg, #ff3333, #cc0000);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 0 20px rgba(255,50,50,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(255,50,50,0.8);
        }
        
        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        
        .mode-btn {
            padding: 12px 40px;
            font-size: 16px;
            color: #fff;
            background: rgba(255,50,50,0.2);
            border: 2px solid #ff3333;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn:hover, .mode-btn:active {
            background: rgba(255,50,50,0.4);
            box-shadow: 0 0 15px rgba(255,50,50,0.5);
        }
        
        .final-score {
            font-size: 60px;
            color: #ffcc00;
            text-shadow: 0 0 30px #ffcc00;
            margin: 20px 0;
        }
        
        .stats {
            color: #888;
            font-size: 14px;
            margin: 5px 0;
        }

        /* 游戏结束界面 */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .end-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* 道具栏 */
        #itemBar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            pointer-events: auto;
        }
        
        .item {
            width: 50px;
            height: 50px;
            background: rgba(30, 30, 40, 0.9);
            border: 3px solid #555;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            position: relative;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s ease;
        }
        
        .item:active {
            transform: scale(0.95);
        }
        
        .item-count {
            position: absolute;
            bottom: -6px;
            right: -6px;
            background: #ff3333;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        /* 道具选中效果 */
        .item.selected {
            border-color: #ffcc00;
            box-shadow: 0 0 20px #ffcc00, 0 0 40px rgba(255, 204, 0, 0.5);
            transform: scale(1.1);
            animation: selectedPulse 0.8s ease-in-out infinite;
        }
        
        @keyframes selectedPulse {
            0%, 100% { box-shadow: 0 0 20px #ffcc00, 0 0 40px rgba(255, 204, 0, 0.5); }
            50% { box-shadow: 0 0 30px #ffcc00, 0 0 60px rgba(255, 204, 0, 0.7); }
        }
        
        .item.selected::after {
            content: '✓';
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ffcc00;
            color: #000;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px #ffcc00;
        }
        
        /* 瞄准线 */
        #aimLine {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.1s ease;
        }
        
        /* 提示 */
        #hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 能量条 */
        #energyBar {
            position: absolute;
            bottom: 40px;
            left: 15px;
            width: 8px;
            height: 100px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #444;
            border-radius: 4px;
            overflow: hidden;
            z-index: 100;
        }
        
        #energyFill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(0deg, #00aaff, #00ffff);
            box-shadow: 0 0 10px #00ffff;
            transition: height 0.3s;
        }
        
        /* 道具说明 */
        #itemHint {
            position: absolute;
            bottom: 70px;
            left: 35px;
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            z-index: 100;
            pointer-events: none;
            text-align: left;
            line-height: 1.4;
        }
        
        /* 返回主页按钮 */
        #homeBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 2px solid #ff3333;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            pointer-events: auto;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255, 50, 50, 0.3);
        }
        
        #homeBtn:hover, #homeBtn:active {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            border-color: #ff6666;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.6);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="logo">🏀 冲天投篮大师 ⚡</div>
    
    <div id="hud">
        <div class="hud-item">⏱️ <span id="timer">60</span><span id="timerUnit">秒</span></div>
        <div class="hud-item">🎯 <span id="score">0</span>分</div>
        <div class="hud-item" id="combo">🔥 x<span id="comboVal">1</span></div>
    </div>
    
    <div id="scorePopups"></div>
    <div id="hint">长按蓄力，松手投出！</div>
    
    <div id="itemBar">
        <div class="item" id="lightningItem">⚡<span class="item-count" id="lightningCount">1</span></div>
        <div class="item" id="shieldItem">🛡️<span class="item-count" id="shieldCount">0</span></div>
        <div class="item" id="iceItem">❄️<span class="item-count" id="iceCount">0</span></div>
    </div>
    
    <button id="homeBtn" title="返回主页">✕</button>
    
    <div id="energyBar">
        <div id="energyFill"></div>
    </div>
    <div id="itemHint">
        ⚡: 必进球<br>
        🛡️: 5秒护盾<br>
        ❄️: 冰冻3秒<br>
        能量满=获得道具
    </div>
    
    <canvas id="aimLine"></canvas>
    
    <div id="overlay">
        <div class="title">🏀 冲天投篮大师 ⚡</div>
        <div class="subtitle">冲天体育出品</div>
        <div class="mode-select">
            <button class="mode-btn" onclick="startGame('classic')">🏆 经典模式 - 60秒限时</button>
            <button class="mode-btn" onclick="startGame('endless')">🧘 无尽模式 - 挑战连击</button>
            <button class="mode-btn" onclick="startGame('target')">🎯 目标模式 - 达成100分</button>
        </div>
    </div>
    
    <!-- 游戏结束界面 -->
    <div id="gameOverScreen" style="display: none;">
        <div class="end-screen">
            <div class="title">🏆 游戏结束</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="stats" id="stats1"></div>
            <div class="stats" id="stats2"></div>
            <div class="stats" id="stats3"></div>
            <button class="btn" onclick="showMenu()">再来一局</button>
        </div>
    </div>

    <script>
    // ==================== 画布设置 ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const aimCanvas = document.getElementById('aimLine');
    const aimCtx = aimCanvas.getContext('2d');
    
    let W, H;
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        aimCanvas.width = window.innerWidth;
        aimCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // ==================== 游戏状态 ====================
    const game = {
        mode: 'classic',
        state: 'menu',
        score: 0,
        combo: 0,
        maxCombo: 0,
        perfectCount: 0,
        totalShots: 0,
        timeLeft: 60,
        power: 0,
        isCharging: false,
        chargeStartTime: 0,
        touchStartX: 0,
        touchStartY: 0,
        items: { lightning: 1, shield: 0, ice: 0 },
        energy: 0,
        targetScore: 100,
        frozen: false,
        frozenTimer: 0,
        shielded: false,
        shieldedTimer: 0,
        hoopSpeed: 2
    };
    
    // ==================== 篮球 ====================
    const ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 20, visible: true };
    
    // ==================== 篮筐 ====================
    const hoop = { x: 0, y: 0, width: 100, height: 15, dir: 1, speed: 2 };
    
    // ==================== 得分圈 ====================
    const rings = [
        { radius: 15, color: '#ffdd00', points: 5, name: 'PERFECT!' },
        { radius: 35, color: '#ff3333', points: 3, name: 'GREAT!' },
        { radius: 55, color: '#ffffff', points: 1, name: 'OK!' }
    ];
    
    // ==================== 粒子系统 ====================
    let particles = [];
    
    function createParticles(x, y, color, count = 20) {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
            const speed = 3 + Math.random() * 5;
            particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color, size: 3 + Math.random() * 4 });
        }
    }
    
    function updateParticles() {
        particles = particles.filter(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
            return p.life > 0;
        });
    }
    
    function drawParticles() {
        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
    }
    
    // ==================== 星空背景 ====================
    const stars = [];
    for (let i = 0; i < 100; i++) {
        stars.push({ x: Math.random(), y: Math.random(), size: 0.5 + Math.random() * 2, twinkle: Math.random() * Math.PI * 2, speed: 0.02 + Math.random() * 0.05 });
    }
    
    let meteors = [];
    
    function spawnMeteor() {
        if (Math.random() < 0.01 && game.state === 'playing') {
            meteors.push({ x: Math.random() * W, y: -50, vx: 2 + Math.random() * 3, vy: 5 + Math.random() * 5, life: 1, trail: [] });
        }
    }
    
    function updateMeteors() {
        meteors = meteors.filter(m => {
            m.trail.unshift({ x: m.x, y: m.y });
            if (m.trail.length > 15) m.trail.pop();
            m.x += m.vx; m.y += m.vy; m.life -= 0.015;
            return m.life > 0 && m.y < H + 50;
        });
    }
    
    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0a0a15');
        grad.addColorStop(0.5, '#151525');
        grad.addColorStop(1, '#0f0f1a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        
        ctx.strokeStyle = 'rgba(255, 50, 50, 0.05)';
        ctx.lineWidth = 1;
        const gridSize = 50;
        for (let x = 0; x < W; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (let y = 0; y < H; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
        
        stars.forEach(star => {
            star.twinkle += star.speed;
            const brightness = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(star.twinkle));
            ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
            ctx.beginPath();
            ctx.arc(star.x * W, star.y * H, star.size, 0, Math.PI * 2);
            ctx.fill();
        });
        
        meteors.forEach(m => {
            m.trail.forEach((t, i) => {
                const alpha = (1 - i / m.trail.length) * m.life * 0.5;
                ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                ctx.beginPath();
                ctx.arc(t.x, t.y, 2 - i * 0.1, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.fillStyle = `rgba(255, 255, 255, ${m.life})`;
            ctx.beginPath();
            ctx.arc(m.x, m.y, 3, 0, Math.PI * 2);
            ctx.fill();
        });
        
        if (Math.random() < 0.003) drawLightning();
    }
    
    function drawLightning() {
        const startX = Math.random() * W;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(startX, 0);
        let x = startX;
        for (let y = 0; y < H * 0.3; y += 20) { x += (Math.random() - 0.5) * 60; ctx.lineTo(x, y); }
        ctx.stroke();
    }
    
    // ==================== 篮筐绘制 ====================
    function drawHoop() {
        const hx = hoop.x, hy = hoop.y;
        
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = '#cccccc';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(hx - 60, hy - 80); ctx.lineTo(hx + 60, hy - 80);
        ctx.lineTo(hx + 50, hy - 30); ctx.lineTo(hx - 50, hy - 30);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#ff3333';
        ctx.strokeStyle = '#cc0000';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(hx - 25, hy - 70); ctx.lineTo(hx + 25, hy - 70);
        ctx.lineTo(hx + 25, hy - 45); ctx.lineTo(hx, hy - 35);
        ctx.lineTo(hx - 25, hy - 45);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(hx, hy - 55, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ff3333';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(hx, hy - 55, 7, 3, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(hx, hy - 55, 3, 7, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.moveTo(hx - 4, hy - 58); ctx.lineTo(hx + 2, hy - 55);
        ctx.lineTo(hx - 2, hy - 55); ctx.lineTo(hx + 4, hy - 52);
        ctx.lineTo(hx, hy - 56); ctx.lineTo(hx + 2, hy - 56);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(hx - 10, hy - 70, 20, 30);
        
        ctx.strokeStyle = '#888888';
        ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(hx - 55, hy - 80); ctx.lineTo(hx - 55, hy + 60); ctx.stroke();
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(hx + 55, hy - 80); ctx.lineTo(hx + 55, hy + 60); ctx.stroke();
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(hx - 55, hy + 60); ctx.lineTo(hx + 55, hy + 60); ctx.stroke();
        
        ctx.strokeStyle = '#ff6600';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.ellipse(hx, hy - 20, 35, 12, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = '#ff8833';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(hx, hy - 22, 35, 12, 0, Math.PI, Math.PI * 2);
        ctx.stroke();
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.lineWidth = 1.5;
        for (let i = 0; i <= 6; i++) {
            const startX = hx - 32 + i * 11;
            ctx.beginPath();
            ctx.moveTo(startX, hy - 14);
            ctx.quadraticCurveTo(startX + (i - 3) * 2, hy + 20, hx, hy + 55);
            ctx.stroke();
        }
        for (let j = 0; j < 4; j++) {
            const y = hy - 10 + j * 18;
            const width = 30 - j * 6;
            ctx.beginPath();
            ctx.ellipse(hx, y, width, 4, 0, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        rings.forEach(ring => {
            ctx.strokeStyle = ring.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(hx, hy - 20, ring.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowColor = ring.color;
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.shadowBlur = 0;
        });
        
        if (game.frozen) {
            ctx.fillStyle = 'rgba(100, 200, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(hx, hy - 20, 80, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.8)';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = 'rgba(200, 240, 255, 0.8)';
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const cx = hx + Math.cos(angle) * 75;
                const cy = hy - 20 + Math.sin(angle) * 75;
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        if (game.shielded) {
            ctx.strokeStyle = 'rgba(255, 200, 0, 0.6)';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 4]);
            ctx.beginPath();
            ctx.arc(hx, hy - 20, 90, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }
    
    // ==================== 篮球绘制 ====================
    function drawBall() {
        if (!ball.visible) return;
        const bx = ball.x, by = ball.y;
        
        ctx.fillStyle = '#ff6633';
        ctx.beginPath();
        ctx.arc(bx, by, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = '#cc4400';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(bx, by, ball.radius * 0.9, ball.radius * 0.2, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(bx, by, ball.radius * 0.2, ball.radius * 0.9, 0, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(bx - 5, by - 5, 6, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(bx, by + ball.radius + 5, ball.radius * 0.8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // ==================== 瞄准线 ====================
    function drawAimLine() {
        if (!game.isCharging) {
            aimCtx.clearRect(0, 0, W, H);
            return;
        }
        
        aimCtx.clearRect(0, 0, W, H);
        const bx = ball.x, by = ball.y;
        const dx = game.touchStartX - bx;
        const dy = by - game.touchStartY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const powerFactor = 0.3 + (game.power / 100) * 0.7;
        const baseSpeed = Math.min(dist / 3, 25);
        const speed = baseSpeed * powerFactor;
        
        const powerRatio = game.power / 100;
        let trajectoryColor = powerRatio < 0.4 ? '#00ff00' : powerRatio < 0.7 ? '#ffff00' : '#ff6600';
        
        const distToBall = Math.sqrt(Math.pow(game.touchStartX - bx, 2) + Math.pow(game.touchStartY - by, 2));
        if (distToBall > 30) {
            aimCtx.fillStyle = 'rgba(255, 200, 0, 0.9)';
            aimCtx.beginPath();
            aimCtx.arc(game.touchStartX, game.touchStartY, 12, 0, Math.PI * 2);
            aimCtx.fill();
            aimCtx.fillStyle = '#fff';
            aimCtx.beginPath();
            aimCtx.arc(game.touchStartX, game.touchStartY, 6, 0, Math.PI * 2);
            aimCtx.fill();
            
            aimCtx.strokeStyle = 'rgba(255, 200, 0, 0.6)';
            aimCtx.lineWidth = 3;
            aimCtx.setLineDash([12, 8]);
            aimCtx.beginPath();
            aimCtx.moveTo(game.touchStartX, game.touchStartY);
            aimCtx.lineTo(bx, by);
            aimCtx.stroke();
            aimCtx.setLineDash([]);
        }
        
        // 蓄力条 - 触摸点侧边，竖向
        const touchX = game.touchStartX;
        const touchY = game.touchStartY;
        const barWidth = 18;
        const barHeight = 100;
        const barX = touchX + 30;
        const barY = touchY - barHeight / 2;
        
        aimCtx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        aimCtx.strokeStyle = '#555';
        aimCtx.lineWidth = 2;
        aimCtx.beginPath();
        aimCtx.roundRect(barX, barY, barWidth, barHeight, 9);
        aimCtx.fill();
        aimCtx.stroke();
        
        const gradient = aimCtx.createLinearGradient(0, barY + barHeight, 0, barY);
        gradient.addColorStop(0, '#00ff00');
        gradient.addColorStop(0.5, '#00ddff');
        gradient.addColorStop(1, '#ff6600');
        aimCtx.fillStyle = gradient;
        aimCtx.shadowColor = trajectoryColor;
        aimCtx.shadowBlur = 15;
        aimCtx.beginPath();
        aimCtx.roundRect(barX + 3, barY + barHeight - 3 - (barHeight - 6) * (game.power / 100), barWidth - 6, (barHeight - 6) * (game.power / 100), 6);
        aimCtx.fill();
        aimCtx.shadowBlur = 0;
        
        aimCtx.fillStyle = '#fff';
        aimCtx.font = 'bold 14px Microsoft YaHei';
        aimCtx.textAlign = 'center';
        aimCtx.fillText('⚡ ' + Math.floor(game.power) + '%', barX + barWidth / 2, barY - 10);
        
        if (game.power >= 95) {
            aimCtx.fillStyle = '#ff3333';
            aimCtx.font = 'bold 16px Microsoft YaHei';
            aimCtx.textAlign = 'left';
            aimCtx.shadowColor = '#ff3333';
            aimCtx.shadowBlur = 10;
            aimCtx.fillText('💥 满！', barX + barWidth + 8, barY + barHeight / 2 + 5);
            aimCtx.shadowBlur = 0;
        }
        
        // 方向箭头
        aimCtx.font = '22px Arial';
        aimCtx.textAlign = 'center';
        let directionText = '', arrowColor = '#fff';
        if (Math.abs(dx) < 30) { directionText = '⬆'; arrowColor = '#00ff00'; }
        else if (dx < -30) { directionText = '↖'; arrowColor = '#ffcc00'; }
        else if (dx > 30) { directionText = '↗'; arrowColor = '#ffcc00'; }
        if (directionText) {
            aimCtx.fillStyle = arrowColor;
            aimCtx.shadowColor = arrowColor;
            aimCtx.shadowBlur = 15;
            aimCtx.fillText(directionText, touchX, touchY - 35);
            aimCtx.shadowBlur = 0;
        }
    }
    
    // ==================== 蓄力条 ====================
    function updatePowerBar() {
        const hint = document.getElementById('hint');
        const aimCanvas = document.getElementById('aimLine');
        
        if (game.isCharging) {
            const elapsed = Date.now() - game.chargeStartTime;
            game.power = (elapsed % 1500) / 1500 * 100;
            hint.style.opacity = '0';
            aimCanvas.style.opacity = '1';
        } else {
            hint.style.opacity = '1';
            aimCanvas.style.opacity = '0';
        }
    }
    
    // ==================== 得分飘字 ====================
    function showScorePopup(x, y, points, text, color) {
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.style.left = x + 'px';
        popup.style.top = y + 'px';
        popup.style.color = color;
        popup.innerHTML = `+${points} ${text}`;
        document.getElementById('scorePopups').appendChild(popup);
        setTimeout(() => popup.remove(), 1000);
    }
    
    // ==================== 投篮逻辑 ====================
    function shootBall() {
        const dx = game.touchStartX - ball.x;
        const dy = ball.y - game.touchStartY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        const baseSpeed = Math.min(dist / 2.5, 30);
        const powerFactor = 0.35 + (game.power / 100) * 0.65;
        const speed = baseSpeed * powerFactor;
        
        ball.vx = (dx / dist) * speed;
        ball.vy = -(dy / dist) * speed;
        
        game.state = 'flying';
        game.totalShots++;
        
        if (game.items.lightning > 0 && document.getElementById('lightningItem').classList.contains('selected')) {
            game.items.lightning--;
            updateItemUI();
            document.getElementById('lightningItem').classList.remove('selected');
            createParticles(ball.x, ball.y, '#ffff00', 30);
            setTimeout(() => {
                if (game.state === 'flying') {
                    ball.x = hoop.x;
                    ball.y = hoop.y + 50;
                    ball.vx = 0;
                    ball.vy = 5;
                }
            }, 100);
        }
    }
    
    // ==================== 碰撞检测 ====================
    function checkCollision() {
        const bx = ball.x, by = ball.y;
        const hx = hoop.x, hy = hoop.y - 20;
        
        const dx = bx - hx, dy = by - hy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        let points = 0, hitRing = null;
        for (const ring of rings) {
            if (dist < ring.radius) { points = ring.points; hitRing = ring; break; }
        }
        
        if (points > 0) {
            const comboMultiplier = Math.min(1 + game.combo * 0.25, 3.5);
            const finalPoints = Math.floor(points * comboMultiplier);
            game.score += finalPoints;
            game.combo++;
            game.perfectCount++;
            if (game.combo > game.maxCombo) game.maxCombo = game.combo;
            game.energy += 20;
            if (game.energy >= 100) awardRandomItem();
            createParticles(bx, by, hitRing.color, 30);
            showScorePopup(bx, by - 50, finalPoints, hitRing.name, hitRing.color);
            flashRing(hitRing);
            game.hoopSpeed = Math.min(game.hoopSpeed + 0.2, 6);
            resetBall();
            return true;
        }
        
        if (by < -50 || by > H + 50 || bx < -50 || bx > W + 50) {
            if (!game.shielded) game.combo = 0;
            createParticles(bx, by, '#666', 15);
            resetBall();
            return false;
        }
        return false;
    }
    
    function flashRing(ring) {
        const originalColor = ring.color;
        ring.color = '#ffffff';
        setTimeout(() => ring.color = originalColor, 100);
    }
    
    function awardRandomItem() {
        const items = ['shield', 'ice'];
        const item = items[Math.floor(Math.random() * items.length)];
        game.items[item]++;
        game.energy = 0;
        updateItemUI();
        createParticles(hoop.x, hoop.y, '#00ffff', 30);
        const itemNames = { shield: '🛡️ 护盾', ice: '❄️ 冰冻' };
        showScorePopup(hoop.x, hoop.y - 80, 0, itemNames[item] + ' 已获得!', '#00ffff');
    }
    
    function resetBall() {
        ball.x = W / 2;
        ball.y = H - 100;
        ball.vx = 0;
        ball.vy = 0;
        ball.visible = true;
        game.state = 'playing';
        game.power = 0;
    }
    
    // ==================== 道具使用 ====================
    function useItem(type) {
        if (game.state !== 'playing') return;
        if (type === 'shield' && game.items.shield > 0) {
            game.items.shield--;
            game.shielded = true;
            game.shieldedTimer = 5;
            updateItemUI();
            document.getElementById('shieldItem').classList.remove('selected');
            createParticles(W/2, H - 80, '#ffcc00', 20);
        }
        if (type === 'ice' && game.items.ice > 0) {
            game.items.ice--;
            game.frozen = true;
            game.frozenTimer = 3;
            updateItemUI();
            document.getElementById('iceItem').classList.remove('selected');
            createParticles(W/2, H - 80, '#00ccff', 20);
        }
    }
    
    function updateItemUI() {
        document.getElementById('lightningCount').textContent = game.items.lightning;
        document.getElementById('shieldCount').textContent = game.items.shield;
        document.getElementById('iceCount').textContent = game.items.ice;
        document.getElementById('energyFill').style.height = game.energy + '%';
    }
    
    // ==================== 游戏逻辑 ====================
    function updateHoop() {
        if (!game.frozen) {
            hoop.x += hoop.dir * hoop.speed;
            if (hoop.x > W - 80) { hoop.x = W - 80; hoop.dir = -1; }
            if (hoop.x < 80) { hoop.x = 80; hoop.dir = 1; }
        }
        if (game.frozenTimer > 0) game.frozenTimer -= 1/60;
    }
    
    function updateBall() {
        if (game.state !== 'flying') return;
        ball.x += ball.vx;
        ball.y += ball.vy;
        ball.vy += 0.3;
        checkCollision();
    }
    
    function updateHUD() {
        document.getElementById('score').textContent = game.score;
        const timerEl = document.getElementById('timer');
        const timerUnitEl = document.getElementById('timerUnit');
        if (game.mode === 'endless') {
            timerEl.textContent = '∞';
            timerUnitEl.textContent = '';
        } else if (game.mode === 'target') {
            timerEl.textContent = game.score + '/' + game.targetScore;
            timerUnitEl.textContent = '';
        } else {
            timerEl.textContent = Math.ceil(game.timeLeft);
            timerUnitEl.textContent = '秒';
        }
        const comboEl = document.getElementById('combo');
        const comboVal = document.getElementById('comboVal');
        if (game.combo > 1) {
            comboEl.style.opacity = '1';
            comboVal.textContent = (1 + game.combo * 0.25).toFixed(1);
        } else {
            comboEl.style.opacity = '0';
        }
    }
    
    // ==================== 触控输入 ====================
    function handleInputStart(x, y) {
        if (game.state !== 'playing') return;
        game.isCharging = true;
        game.chargeStartTime = Date.now();
        game.touchStartX = x;
        game.touchStartY = y;
        game.power = 0;
    }
    
    function handleInputMove(x, y) {
        if (!game.isCharging) return;
        game.touchStartX = x;
        game.touchStartY = y;
    }
    
    function handleInputEnd() {
        if (!game.isCharging) return;
        game.isCharging = false;
        if (game.power > 10) shootBall();
        game.power = 0;
    }
    
    // 触屏事件
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; handleInputStart(t.clientX, t.clientY); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; handleInputMove(t.clientX, t.clientY); }, { passive: false });
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleInputEnd(); }, { passive: false });
    canvas.addEventListener('touchcancel', (e) => { e.preventDefault(); handleInputEnd(); }, { passive: false });
    
    // 鼠标事件
    canvas.addEventListener('mousedown', (e) => { handleInputStart(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', (e) => { handleInputMove(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup', () => { handleInputEnd(); });
    
    // 道具点击
    document.getElementById('lightningItem').addEventListener('click', (e) => {
        e.stopPropagation();
        if (game.items.lightning > 0 && game.state === 'playing') {
            const el = document.getElementById('lightningItem');
            el.classList.contains('selected') ? el.classList.remove('selected') : (el.classList.add('selected'), document.getElementById('shieldItem').classList.remove('selected'), document.getElementById('iceItem').classList.remove('selected'));
        }
    });
    
    document.getElementById('shieldItem').addEventListener('click', (e) => {
        e.stopPropagation();
        if (game.items.shield > 0 && game.state === 'playing') {
            useItem('shield');
            const el = document.getElementById('shieldItem');
            el.classList.add('selected');
            showScorePopup(W/2, H - 150, 0, '🛡️ 护盾已激活！', '#ffcc00');
        }
    });
    
    document.getElementById('iceItem').addEventListener('click', (e) => {
        e.stopPropagation();
        if (game.items.ice > 0 && game.state === 'playing') {
            useItem('ice');
            const el = document.getElementById('iceItem');
            el.classList.add('selected');
            showScorePopup(W/2, H - 150, 0, '❄️ 冰冻已激活！', '#00ccff');
        }
    });
    
    // 返回主页
    document.getElementById('homeBtn').addEventListener('click', showMenu);
    
    // ==================== 游戏流程 ====================
    function startGame(mode) {
        game.mode = mode;
        game.state = 'playing';
        game.score = 0;
        game.combo = 0;
        game.maxCombo = 0;
        game.perfectCount = 0;
        game.totalShots = 0;
        game.timeLeft = mode === 'target' ? 90 : 60;
        game.energy = 0;
        game.items = { lightning: 1, shield: 0, ice: 0 };
        game.hoopSpeed = 2;
        game.frozen = false;
        game.shielded = false;
        hoop.x = W / 2;
        hoop.y = 180;
        resetBall();
        updateItemUI();
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('hint').style.opacity = '1';
        if (mode !== 'endless') startTimer();
        else clearInterval(timerInterval);
    }
    
    let timerInterval;
    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (game.state === 'playing' || game.state === 'flying') {
                game.timeLeft -= 1/60;
                if (game.mode === 'target' && game.score >= game.targetScore) endGame();
                if (game.timeLeft <= 0) endGame();
            }
        }, 1000/60);
    }
    
    function endGame() {
        game.state = 'gameover';
        clearInterval(timerInterval);
        document.getElementById('finalScore').textContent = game.score;
        document.getElementById('stats1').textContent = `🎯 投篮次数: ${game.totalShots}`;
        document.getElementById('stats2').textContent = `🔥 最高连击: x${game.maxCombo}`;
        document.getElementById('stats3').textContent = `⭐ 完美球: ${game.perfectCount}个`;
        document.getElementById('gameOverScreen').style.display = 'flex';
    }
    
    function showMenu() {
        game.state = 'menu';
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('gameOverScreen').style.display = 'none';
    }
    
    // ==================== 主循环 ====================
    function gameLoop() {
        ctx.clearRect(0, 0, W, H);
        drawBackground();
        spawnMeteor();
        updateMeteors();
        if (game.state === 'playing' || game.state === 'flying') {
            updateHoop();
            updateBall();
            updateParticles();
            updatePowerBar();
            updateHUD();
        }
        drawHoop();
        drawBall();
        drawParticles();
        drawAimLine();
        requestAnimationFrame(gameLoop);
    }
    
    function init() {
        resetBall();
        hoop.x = W / 2;
        hoop.y = 180;
        gameLoop();
    }
    
    init();
    </script>
</body>
</html>
